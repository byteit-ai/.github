# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Shared lint workflow — Python (ruff)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Call from any repo:
#    uses: byteit-ai/github-workflows/.github/workflows/lint.yml@main
#
#  Debug: set repo secret ACTIONS_STEP_DEBUG=true for verbose runner logs.
#  Shell scripts honour $RUNNER_DEBUG via set -x automatically.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Lint

on:
  workflow_call:
    inputs:
      linter:
        description: "Linter to use: ruff (Python) | eslint (JS/TS) | all"
        type: string
        default: "ruff"
      max_lines_warn:
        description: "Soft limit — total changed lines"
        type: number
        default: 200
      max_lines_hard:
        description: "Hard limit — total changed lines"
        type: number
        default: 500
      max_files_warn:
        description: "Soft limit — total changed files"
        type: number
        default: 10
      max_files_hard:
        description: "Hard limit — total changed files"
        type: number
        default: 50
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init log files
        run: touch errors.log warnings.log

      # ── Ruff linter (Python) ──────────────────────
      - name: Checkout shared ruff config
        if: inputs.linter == 'ruff' || inputs.linter == 'all'
        uses: actions/checkout@v4
        with:
          repository: byteit-ai/github-workflows
          path: .github-workflows
          sparse-checkout: ruff.toml

      - name: Install Ruff
        if: inputs.linter == 'ruff' || inputs.linter == 'all'
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          pip install ruff==0.15.2
          ruff --version

      - name: Ruff — lint
        if: inputs.linter == 'ruff' || inputs.linter == 'all'
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          ruff check . --config .github-workflows/ruff.toml --output-format=github

      - name: Ruff — format check
        if: inputs.linter == 'ruff' || inputs.linter == 'all'
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          ruff format . --check --config .github-workflows/ruff.toml

      # ── ESLint (JS/TS) ────────────────────────────
      - name: Setup Node.js
        if: inputs.linter == 'eslint' || inputs.linter == 'all'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install npm dependencies
        if: inputs.linter == 'eslint' || inputs.linter == 'all'
        run: npm ci

      - name: ESLint
        if: inputs.linter == 'eslint' || inputs.linter == 'all'
        run: npx eslint --max-warnings 0 --format stylish

      # ── PR size — lines & files ────────────
      - name: PR size
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          git fetch origin "$BASE_REF" --quiet 2>/dev/null || true

          # Exclude docs / config / lock files, migrations, and test files from line counts
          STATS=$(git diff --numstat "origin/$BASE_REF"..."$HEAD_SHA" \
            -- . ':!*.md' ':!*.txt' ':!*.json' ':!*.yml' ':!*.yaml' ':!*.lock' \
               ':!**/migrations/**' ':!**/test_*.py' ':!api_schema.yml' ':!api-docs-redocly.html' \
            2>/dev/null || true)

          ADD=0; DEL=0; FILES=0
          while IFS=$'\t' read -r a d f; do
            [ -z "$f" ] && continue
            [[ "$a" == "-" ]] && continue          # skip binaries
            ADD=$((ADD + a)); DEL=$((DEL + d)); FILES=$((FILES + 1))
          done <<< "$STATS"

          LINES=$((ADD + DEL))

          # ── Lines (only enforced for PRs into dev) ──
          if [ "$BASE_REF" = "dev" ]; then
            if [ "$LINES" -gt ${{ inputs.max_lines_hard }} ]; then
              echo "❌ PR too large: $LINES lines changed (limit ${{ inputs.max_lines_hard }})" >> errors.log
            elif [ "$LINES" -gt ${{ inputs.max_lines_warn }} ]; then
              echo "⚠️  Large PR: $LINES lines changed (recommended < ${{ inputs.max_lines_warn }})" >> warnings.log
            fi
          fi

          # ── Files ──
          if [ "$FILES" -gt ${{ inputs.max_files_hard }} ]; then
            echo "❌ Too many files changed: $FILES (limit ${{ inputs.max_files_hard }})" >> errors.log
          elif [ "$FILES" -gt ${{ inputs.max_files_warn }} ]; then
            echo "⚠️  Many files changed: $FILES (recommended < ${{ inputs.max_files_warn }})" >> warnings.log
          fi

      # ── 📋 Size report ─────────────────────────
      - name: "📋 Size Report"
        if: always() && github.event_name == 'pull_request'
        run: |
          (
            if [ -s warnings.log ]; then
              echo "### ⚠️  Warnings"
              cat warnings.log
              echo ""
            fi
            if [ -s errors.log ]; then
              echo "### ❌ Errors"
              cat errors.log
              echo ""
            fi
          ) | tee -a "$GITHUB_STEP_SUMMARY"

          if [ -s errors.log ]; then
            exit 1
          fi

  # ── AdolfoBOT — move issue back to In Progress on failure ───────────────
  notify-failure:
    name: AdolfoBOT — Notify Failure
    needs: [lint]
    if: failure() && github.event_name == 'pull_request' && github.run_attempt == 1
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Lint (${{ inputs.linter }})"
      extra_context: |
        Linter ${{ inputs.linter }} failed.
        Run the relevant linter locally to reproduce before pushing again.
    secrets: inherit


