# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Unit Tests — reusable workflow
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Purpose:
#  - Provide a shared unit-test hook for ByteIT repos
#  - Temporarily no-op while test execution is disabled
#  - Reuse across ByteIT repos through workflow_call
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Unit Tests

on:
  workflow_call:
    inputs:
      python_version:
        description: "Python version used to run unit tests"
        type: string
        default: "3.12"
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Temporary no-op
        run: |
          echo "Unit Tests is temporarily disabled and intentionally succeeds."

  notify-failure:
    name: AdolfoBOT — Notify Failure
    needs: [unit-tests]
    if: failure() && github.event_name == 'pull_request' && github.run_attempt == 1
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Unit Tests"
      extra_context: |
        Unit-test workflow failed.
        Verify the repository-specific unit test setup is passing.
    secrets: inherit
