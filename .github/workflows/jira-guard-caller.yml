# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Jira Guard + AdolfoBOT — for .github repo
#
#  Enforces:
#    - Jira keys in PR titles or branch names
#    - Jira issue exists and is In Progress or Review
#    - Minimum PR description length
#    - Conflict detection on main/dev pushes
#
#  AdolfoBOT integration:
#    - Notifies Jira on workflow failures
#    - Transitions issue back to In Progress
#    - Posts review-changes comments
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Jira Guard

on:
  pull_request:
    types: [opened, edited, reopened, synchronize, closed]
  pull_request_review:
    types: [submitted]
  push:
    branches: [dev, main]

jobs:
  jira-guard:
    permissions:
      pull-requests: read
      contents: read
    uses: byteit-ai/.github/.github/workflows/jira-guard.yml@main
    secrets:
      JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
      JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
