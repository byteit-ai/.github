# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Jira Guard — reusable PR quality gate + conflict scanner
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  Call from any repo:
#    uses: byteit-ai/.github/.github/workflows/jira-guard.yml@main
#
#  Caller triggers:
#    ci.yml         — pull_request: [opened, synchronize, reopened]
#    cd.yml         — push: [main]
#    review-guard.yml — pull_request_review: [submitted] (via step 2c)
#  All transitions use .to.name (never hardcoded transition names).
#  Debug: set repo secret ACTIONS_STEP_DEBUG=true for verbose runner logs.
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
name: Jira Guard

on:
  workflow_call:
    inputs:
      jira_domain:
        description: "Jira cloud domain (e.g. mycompany.atlassian.net)"
        type: string
        default: "byteit-ai.atlassian.net"
      min_description_length:
        description: "Minimum PR body length (chars)"
        type: number
        default: 20
      pr_agent_enabled:
        description: "Enable PR Agent review"
        type: boolean
        default: true
    secrets:
      JIRA_EMAIL:
        required: true
      JIRA_API_TOKEN:
        required: true
      LLM_API_KEY:
        required: false
      LLM_API_BASE:
        required: false
      LLM_MODEL:
        required: false

jobs:
  jira-guard:
    name: Jira Guard
    if: github.event_name != 'merge_group'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      jira_key: ${{ steps.jira_key.outputs.key }}

    steps:
      # ── 0 · Setup ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Init log files
        run: touch errors.log warnings.log

      # ── 1 · Extract Jira key ──────────────────
      - name: "1 · Extract Jira key"
        id: jira_key
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          GIT_EVENT: ${{ github.event_name }}
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x
          KEY=""

          if [ "$GIT_EVENT" = "push" ]; then
            # On push (PR merged), extract Jira key from merge commit message
            # Format: "Merge pull request #N from user/PROJ-123-fix"
            if [[ "$HEAD_COMMIT_MSG" =~ ([A-Z]+-[0-9]+) ]]; then
              KEY="${BASH_REMATCH[1]}"
            fi
          else
            # dev → main is a release PR — no Jira key required
            if [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]]; then
              echo "key=" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            # Branch formats (anchored to start, in priority order):
            #   PROJ-123-free_text   → capture group 1
            if [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]]; then
              KEY="${BASH_REMATCH[1]}"
            elif [[ "$PR_TITLE" =~ ^([A-Z]+-[0-9]+)([^0-9]|$) ]]; then
              KEY="${BASH_REMATCH[1]}"
            fi
          fi

          if [ -z "$KEY" ]; then
            echo "❌ No Jira key in branch name or PR title" >> errors.log
          fi
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      # ── 2 · Transition to Review (PR opened/reopened/synchronized) ─
      - name: "2 · Transition to Review"
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request' && github.event.action != 'closed'
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          HTTP=$(curl -s -o jira_response.json -w "%{http_code}" \
            -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY")

          if [ "$HTTP" -ne 200 ]; then
            echo "❌ Jira issue $JIRA_KEY not found (HTTP $HTTP)" >> errors.log
            exit 0
          fi

          STATUS=$(jq -r '.fields.status.name' jira_response.json)

          if [ "$STATUS" == "In Progress" ]; then
            TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
            TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.to.name=="Review") | .id' | head -1)
            if [ -z "$TRANS_ID" ]; then
              echo "❌ Could not find a transition to 'Review' for $JIRA_KEY (available: $(echo \"$TRANS\" | jq -r '[.transitions[].name] | join(\", \")'))" >> errors.log
            else
              curl -sf -X POST \
                -u "$JIRA_EMAIL:$JIRA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
                "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
              echo "✅ Transitioned $JIRA_KEY: 'In Progress' → 'Review'"
            fi
          elif [ "$STATUS" != "Review" ]; then
            echo "❌ Issue status is '$STATUS', expected 'In Progress' or 'Review'" >> errors.log
          fi

      # ── 2 · Output transition for Review comment ──
      - name: "2 · Output Review transition context"
        id: review_transition
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request' && github.event.action != 'closed'
        run: |
          TRANSITIONED="false"
          if [ -f jira_response.json ]; then
            STATUS=$(jq -r '.fields.status.name' jira_response.json 2>/dev/null || echo "")
            [ "$STATUS" == "In Progress" ] && TRANSITIONED="true"
          fi
          echo "transitioned=$TRANSITIONED" >> "$GITHUB_OUTPUT"

      # ── 2b · Transition to DONE on push (PR merged → main) ──
      - name: "2b · Transition to DONE"
        if: steps.jira_key.outputs.key != '' && github.event_name == 'push'
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          ISSUE=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY?fields=status")
          FROM_STATUS=$(echo "$ISSUE" | jq -r '.fields.status.name')

          TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
          TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.to.name=="Done") | .id' | head -1)

          if [ -z "$TRANS_ID" ]; then
            echo "⚠️  Could not find a transition to 'Done' for $JIRA_KEY (available: $(echo "$TRANS" | jq -r '[.transitions[].name] | join(", ")'))" >> warnings.log
          else
            curl -sf -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
            echo "✅ Transitioned $JIRA_KEY: '$FROM_STATUS' → 'Done'"
          fi

      # ── 2b · Output Done transition context ──
      - name: "2b · Output Done transition context"
        id: done_transition
        if: steps.jira_key.outputs.key != '' && github.event_name == 'push'
        run: |
          echo "transitioned=true" >> "$GITHUB_OUTPUT"

      # ── 2c · Transition to In Progress on changes requested ──
      - name: "2c · Transition to In Progress (changes requested)"
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
        env:
          JIRA_KEY: ${{ steps.jira_key.outputs.key }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          ISSUE=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY?fields=status")
          FROM_STATUS=$(echo "$ISSUE" | jq -r '.fields.status.name')

          TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
            -H "Accept: application/json" \
            "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions")
          TRANS_ID=$(echo "$TRANS" | jq -r '.transitions[] | select(.to.name=="In Progress") | .id' | head -1)
          if [ -z "$TRANS_ID" ]; then
            echo "⚠️  Could not find a transition to 'In Progress' for $JIRA_KEY (available: $(echo "$TRANS" | jq -r '[.transitions[].name] | join(\", \")'))" >> warnings.log
          else
            curl -sf -X POST \
              -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$JIRA_KEY/transitions"
            echo "✅ Transitioned $JIRA_KEY: '$FROM_STATUS' → 'In Progress' (changes requested by $REVIEWER)"
          fi
          # Comment posting delegated to AdolfoBOT job below

      # ── 2c · Output In Progress transition context ──
      - name: "2c · Output In Progress transition context"
        id: inprogress_transition
        if: steps.jira_key.outputs.key != '' && github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
        run: |
          echo "transitioned=true" >> "$GITHUB_OUTPUT"

      # ── 3 · Blocking dependencies must be DONE ─
      - name: "3 · Jira dependencies"
        if: steps.jira_key.outputs.key != ''
        env:
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
        run: |
          [ ! -f jira_response.json ] && exit 0

          # Only pick up links where THIS issue is blocked by another (inward direction).
          # Outward "Blocks" links (this issue blocks something else) must NOT block the PR.
          BLOCKERS=$(jq -r '
            .fields.issuelinks[]?
            | select(.type.name=="Blocks" and (.inwardIssue != null))
            | .inwardIssue.key
          ' jira_response.json 2>/dev/null)

          OPEN=""
          for B in $BLOCKERS; do
            RESP=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" \
              -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$B" 2>/dev/null) || continue
            B_STATUS=$(echo "$RESP" | jq -r '.fields.status.name')
            B_STATUS_LOWER=$(echo "$B_STATUS" | tr '[:upper:]' '[:lower:]')
            if [ "$B_STATUS_LOWER" != "done" ]; then
              OPEN="$OPEN $B ($B_STATUS)"
            fi
          done

          if [ -n "$OPEN" ]; then
            echo "❌ Blocked by unresolved dependencies:$OPEN" >> errors.log
          fi

      # ── 4 · Sensitive / secret file scan ───────
      - name: "4 · Sensitive file scan"
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          CHANGED=$(git diff --name-only "origin/$BASE_REF"..."$HEAD_SHA" 2>/dev/null || true)

          # Patterns that should never appear in a PR
          DENY='(\.env(\..*)?|\.pem|\.key|\.p12|\.pfx|\.keystore|\.jks|\.secret|\.secrets|\.npmrc|\.pypirc|id_rsa|id_ed25519|id_dsa|credentials|service[-_]account.*\.json)$'

          FLAGGED=""
          while IFS= read -r FILE; do
            [ -z "$FILE" ] && continue
            BASENAME=$(basename -- "$FILE")
            if [[ "$BASENAME" =~ $DENY ]]; then
              FLAGGED="${FLAGGED}  • ${FILE}\n"
            fi
          done <<< "$CHANGED"

          if [ -n "$FLAGGED" ]; then
            echo "❌ Sensitive files detected in PR:" >> errors.log
            echo -e "$FLAGGED" >> errors.log
          fi

      # ── 5 · PR description ────────────────────
      - name: "5 · PR description"
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          LEN=${#PR_BODY}
          if [ "$LEN" -lt ${{ inputs.min_description_length }} ]; then
            echo "⚠️  PR description too short ($LEN chars, min ${{ inputs.min_description_length }})" >> warnings.log
          fi

      # # ── 6 · Branch policy ─────────────────────
      # - name: "6 · Branch policy"
      #   env:
      #     BASE_REF: ${{ github.event.pull_request.base.ref }}
      #     HEAD_REF: ${{ github.event.pull_request.head.ref }}
      #   run: |
      #     # Release PR: dev → main is always allowed
      #     if [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]]; then
      #       exit 0
      #     fi

      #     # All branches must target dev or main
      #     if [[ "$BASE_REF" != "dev" && "$BASE_REF" != "main" ]]; then
      #       echo "❌ Branch '$HEAD_REF' must target 'dev' or 'main', not '$BASE_REF'" >> errors.log
      #     fi

      # ── 📋 Final report ───────────────────────
      - name: "📋 Summary"
        if: always()
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          PUSH_REF: ${{ github.ref }}
        run: |
          BRANCH_DISPLAY="${HEAD_REF:-${PUSH_REF}}"
          BASE_DISPLAY="${BASE_REF:-}"
          [ -n "$BASE_DISPLAY" ] && BRANCH_DISPLAY="${BRANCH_DISPLAY} → ${BASE_DISPLAY}"
          (
            echo "## 🛡️ Jira Guard"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Jira key | \`${{ steps.jira_key.outputs.key || 'n/a' }}\` |"
            echo "| Event | \`${{ github.event_name }}\` / \`${{ github.event.action }}\` |"
            echo "| Ref | \`$BRANCH_DISPLAY\` |"
            echo ""
            if [ -s warnings.log ]; then
              echo "### ⚠️  Warnings"
              cat warnings.log
              echo ""
            fi
            if [ -s errors.log ]; then
              echo "### ❌ Errors"
              cat errors.log
            else
              echo "### ✅ All checks passed"
            fi
          ) | tee -a "$GITHUB_STEP_SUMMARY"

          if [ -s errors.log ]; then
            exit 1
          fi

  # ── Conflict scanner — runs on PR close only ────────────────────────────
  conflict-check:
    name: Conflict Check
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: read
      contents: read
    outputs:
      conflict_count: ${{ steps.scan.outputs.conflict_count }}
      conflict_details_json: ${{ steps.scan.outputs.conflict_details_json }}

    steps:
      - name: Scan open PRs for merge conflicts
        id: scan
        env:
          GH_TOKEN: ${{ github.token }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_DOMAIN: ${{ inputs.jira_domain }}
          REPO: ${{ github.repository }}
        run: |
          [[ "${RUNNER_DEBUG:-0}" == "1" ]] && set -x

          PRS=$(gh api "repos/$REPO/pulls?state=open&per_page=100")
          CONFLICT_COUNT=0
          DETAILS="[]"

          while IFS= read -r PR; do
            PR_NUMBER=$(echo "$PR" | jq -r '.number')
            HEAD_REF=$(echo "$PR"  | jq -r '.head.ref')
            BASE_REF=$(echo "$PR"  | jq -r '.base.ref')

            # Skip dev→main release PRs
            [[ "$HEAD_REF" == "dev" && "$BASE_REF" == "main" ]] && continue

            # GitHub computes mergeability lazily — retry up to 5 times
            MERGEABLE="null"
            for i in $(seq 1 5); do
              PR_DETAIL=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
              MERGEABLE=$(echo "$PR_DETAIL" | jq -r '.mergeable')
              MERGEABLE_STATE=$(echo "$PR_DETAIL" | jq -r '.mergeable_state')
              [[ "$MERGEABLE" != "null" ]] && break
              sleep 6
            done

            [[ "$MERGEABLE" != "false" && "$MERGEABLE_STATE" != "dirty" ]] && continue

            echo "⚠️  PR #$PR_NUMBER ($HEAD_REF → $BASE_REF) has conflicts"
            CONFLICT_COUNT=$((CONFLICT_COUNT + 1))

            # Extract Jira key from branch name
            KEY=""
            [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]] && KEY="${BASH_REMATCH[1]}"
            [ -z "$KEY" ] && echo "  ↳ No Jira key found, skipping" && continue

            # Transition to In Progress using only .to.name
            TRANS=$(curl -sf -u "$JIRA_EMAIL:$JIRA_TOKEN" -H "Accept: application/json" \
              "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY/transitions")
            TRANS_ID=$(echo "$TRANS" | jq -r '
              .transitions[] | select(.to.name=="In Progress") | .id
            ' | head -1)
            if [ -n "$TRANS_ID" ]; then
              curl -s -o /dev/null -X POST -u "$JIRA_EMAIL:$JIRA_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"transition\":{\"id\":\"$TRANS_ID\"}}" \
                "https://$JIRA_DOMAIN/rest/api/3/issue/$KEY/transitions"
              echo "  ↳ $KEY → In Progress"
            fi

            PR_URL="${GITHUB_SERVER_URL}/$REPO/pull/$PR_NUMBER"
            DETAILS=$(echo "$DETAILS" | jq \
              --arg key "$KEY" \
              --arg pr_url "$PR_URL" \
              --arg pr_num "$PR_NUMBER" \
              '. + [{"jira_key": $key, "pr_url": $pr_url, "pr_number": $pr_num}]')

          done < <(echo "$PRS" | jq -c '.[]')

          echo "conflict_count=$CONFLICT_COUNT" >> "$GITHUB_OUTPUT"
          echo "conflict_details_json=$DETAILS" >> "$GITHUB_OUTPUT"
          echo "## 🔀 Conflict Check — $CONFLICT_COUNT conflicting PR(s) found" >> "$GITHUB_STEP_SUMMARY"

  # ── AdolfoBOT — post conflict notifications ──────────────────────────────
  notify-conflicts:
    name: AdolfoBOT — Notify Conflicts
    needs: [conflict-check]
    if: always() && needs.conflict-check.result == 'success' && needs.conflict-check.outputs.conflict_count != '0'
    strategy:
      matrix:
        conflict: ${{ fromJSON(needs.conflict-check.outputs.conflict_details_json) }}
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Conflict Check"
      mode: "comment"
      jira_key_override: ${{ matrix.conflict.jira_key }}
      comment_body: "⚠️ PR #${{ matrix.conflict.pr_number }} has merge conflicts: ${{ matrix.conflict.pr_url }}"
    secrets: inherit

  # ── AdolfoBOT — move issue back to In Progress on workflow failure ───────
  notify-failure:
    name: AdolfoBOT — Notify Failure
    needs: [jira-guard]
    if: failure() && github.event_name == 'pull_request' && github.run_attempt == 1
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Jira Guard"
    secrets: inherit

  # ── PR Agent — automated review (opened/synchronize/reopened) ─────────────
  pr-agent-full:
    name: PR Agent (full review)
    needs: [jira-guard]
    if: github.event_name == 'pull_request' && (github.event.action == 'opened' || github.event.action == 'reopened') && inputs.pr_agent_enabled
    uses: ./.github/workflows/pr-agent.yml
    with:
      mode: "full"
    secrets:
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
      LLM_MODEL: ${{ secrets.LLM_MODEL }}

  # ── AdolfoBOT — post Review transition comment (PR opened/reopened) ──
  prepare-review-comment:
    name: AdolfoBOT — Prepare Review Comment
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    needs: [jira-guard]
    runs-on: ubuntu-latest
    outputs:
      jira_key:     ${{ steps.extract.outputs.key }}
      comment_body: ${{ steps.extract.outputs.comment }}
    steps:
      - id: extract
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        run: |
          KEY=""
          [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]] && KEY="${BASH_REMATCH[1]}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          [ -z "$KEY" ] && exit 0

          COMMENT=$(printf "PR #%s opened (In Progress → Review).\nAuthor: %s\nPR: %s" "$PR_NUMBER" "$PR_AUTHOR" "$PR_TITLE")
          {
            echo "comment<<DELIMEOF"
            echo -e "$COMMENT"
            echo "DELIMEOF"
          } >> "$GITHUB_OUTPUT"

  post-review-comment:
    name: AdolfoBOT — Post Review Comment
    needs: [prepare-review-comment]
    if: always() && needs.prepare-review-comment.result == 'success' && needs.prepare-review-comment.outputs.jira_key != ''
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Jira Guard"
      mode: "comment"
      jira_key_override: ${{ needs.prepare-review-comment.outputs.jira_key }}
      comment_body: ${{ needs.prepare-review-comment.outputs.comment_body }}
    secrets: inherit

  # ── AdolfoBOT — post In Progress transition comment (changes requested) ──
  prepare-inprogress-comment:
    name: AdolfoBOT — Prepare In Progress Comment
    if: github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    outputs:
      jira_key:     ${{ steps.extract.outputs.key }}
      comment_body: ${{ steps.extract.outputs.comment }}
    steps:
      - id: extract
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          REVIEWER: ${{ github.event.review.user.login }}
        run: |
          KEY=""
          [[ "$HEAD_REF" =~ ^([A-Z]+-[0-9]+)(-|$) ]] && KEY="${BASH_REMATCH[1]}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          [ -z "$KEY" ] && exit 0

          REVIEW_BODY=$(jq -r '.review.body // ""' "$GITHUB_EVENT_PATH")
          COMMENT=$(printf "🔄 Changes requested by %s — issue moved back to In Progress." "$REVIEWER")
          if [ -n "$REVIEW_BODY" ]; then
            COMMENT="$COMMENT\n\nReview notes:\n$REVIEW_BODY"
          fi
          {
            echo "comment<<DELIMEOF"
            echo -e "$COMMENT"
            echo "DELIMEOF"
          } >> "$GITHUB_OUTPUT"

  post-inprogress-comment:
    name: AdolfoBOT — Post In Progress Comment
    needs: [prepare-inprogress-comment]
    if: always() && needs.prepare-inprogress-comment.result == 'success' && needs.prepare-inprogress-comment.outputs.jira_key != ''
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Jira Guard"
      mode: "comment"
      jira_key_override: ${{ needs.prepare-inprogress-comment.outputs.jira_key }}
      comment_body: ${{ needs.prepare-inprogress-comment.outputs.comment_body }}
    secrets: inherit

  # ── AdolfoBOT — post Done-on-push comment with assignee + reviewer mentions ──
  prepare-done-comment:
    name: AdolfoBOT — Prepare Done Comment
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      jira_key: ${{ steps.extract.outputs.key }}
      comment_body: ${{ steps.extract.outputs.comment }}
    steps:
      - id: extract
        env:
          HEAD_COMMIT_MSG: ${{ github.event.head_commit.message }}
          PUSHER: ${{ github.event.pusher.name }}
          REF: ${{ github.ref_name }}
        run: |
          KEY=""
          [[ "$HEAD_COMMIT_MSG" =~ ([A-Z]+-[0-9]+) ]] && KEY="${BASH_REMATCH[1]}"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"
          [ -z "$KEY" ] && exit 0

          COMMENT=$(printf "Code merged to %s — issue moved to Done.\nPushed by: %s" "$REF" "$PUSHER")
          {
            echo "comment<<DELIMEOF"
            echo -e "$COMMENT"
            echo "DELIMEOF"
          } >> "$GITHUB_OUTPUT"

  post-done-comment:
    name: AdolfoBOT — Post Done Comment
    needs: [prepare-done-comment]
    if: always() && needs.prepare-done-comment.result == 'success' && needs.prepare-done-comment.outputs.jira_key != ''
    uses: byteit-ai/.github/.github/workflows/adolfobot.yml@main
    with:
      workflow_name: "Jira Guard"
      mode: "comment"
      jira_key_override: ${{ needs.prepare-done-comment.outputs.jira_key }}
      comment_body: ${{ needs.prepare-done-comment.outputs.comment_body }}
    secrets: inherit

